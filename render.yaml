services:
  - type: web
    name: signspeaks
    env: python
    buildCommand: |
      apt-get update && apt-get install -y build-essential gfortran libatlas-base-dev python3-dev
      pip install --upgrade pip setuptools wheel
      pip install --only-binary=:all: numpy==1.21.6
      pip install -r requirements.txt
    startCommand: gunicorn web_app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.8.0"
      - key: PORT
        value: 10000 